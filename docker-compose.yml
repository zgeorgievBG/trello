services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trello
      POSTGRES_PASSWORD: trello
      POSTGRES_DB: trello
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trello"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    environment:
      DATABASE_URL: postgresql://trello:trello@postgres:5432/trello
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build: ./client
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  pgdata:
